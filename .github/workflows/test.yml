name: Test & Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: extension
        run: npm ci

      - name: Run tests
        working-directory: extension
        run: npm test

      - name: Build extension
        working-directory: extension
        run: npm run build
